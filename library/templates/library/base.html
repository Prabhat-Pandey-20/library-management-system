<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Library Management System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #1f2937;
      --light: #f3f4f6;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .navbar {
      background: rgba(31, 41, 55, 0.95) !important;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .navbar-brand { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }
    .nav-btn {
      border-radius: 8px; padding: 6px 18px; font-weight: 500;
      transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2);
    }
    .nav-btn:hover {
      background: var(--primary); border-color: var(--primary);
      transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }
    .nav-btn.active { background: var(--primary); border-color: var(--primary); }
    .card {
      border: none; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.98); backdrop-filter: blur(10px);
      animation: fadeUp 0.6s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card h2 { color: var(--dark); font-weight: 700; margin-bottom: 1.5rem; }
    .form-control {
      border-radius: 10px; border: 2px solid #e5e7eb; padding: 10px 14px;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }
    .btn {
      border-radius: 10px; font-weight: 600; padding: 10px 20px;
      transition: all 0.3s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-success { background: var(--success); border-color: var(--success); }
    .btn-warning { background: var(--warning); border-color: var(--warning); color: white; }
    .btn-danger { background: var(--danger); border-color: var(--danger); }
    .table { border-radius: 12px; overflow: hidden; }
    .table thead th {
      background: var(--dark); color: white; font-weight: 600; padding: 14px; border: none;
    }
    .table tbody tr { transition: all 0.2s ease; }
    .table tbody tr:hover { background: #f9fafb; transform: scale(1.005); }
    .table tbody td { padding: 14px; vertical-align: middle; }
    .badge { padding: 6px 12px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; }
    .badge-issued { background: #fee2e2; color: #991b1b; }
    .badge-returned { background: #d1fae5; color: #065f46; }
    .badge-available { background: #d1fae5; color: #065f46; }
    .badge-unavailable { background: #fee2e2; color: #991b1b; }
    .empty-state { text-align: center; padding: 40px; color: #9ca3af; }
    .empty-state i { font-size: 3rem; margin-bottom: 10px; }
    .stats-row { display: flex; gap: 20px; margin-bottom: 24px; }
    .stat-card {
      flex: 1; background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
      transition: transform 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { color: #6b7280; font-size: 0.9rem; font-weight: 500; }
    .stat-bar { height: 4px; border-radius: 2px; margin-top: 10px; background: #e5e7eb; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .slide-in { animation: slideIn 0.4s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .delete-btn { opacity: 0.7; transition: all 0.2s ease; }
    .delete-btn:hover { opacity: 1; transform: scale(1.1); }
    .return-btn {
      background: var(--success); color: white; border: none;
      padding: 6px 14px; border-radius: 8px; font-weight: 600;
      transition: all 0.2s ease; text-decoration: none; display: inline-block;
    }
    .return-btn:hover { background: #059669; transform: translateY(-1px); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3">
    <div class="container-fluid">
      <span class="navbar-brand"><i class="fas fa-book-reader me-2"></i>Library System</span>
      <div class="d-flex gap-2">
        <a href="{% url 'student_list' %}" class="btn btn-outline-light btn-sm nav-btn {% if request.path == '/' %}active{% endif %}">
          <i class="fas fa-users me-1"></i>Students
        </a>
        <a href="{% url 'book_list' %}" class="btn btn-outline-light btn-sm nav-btn {% if request.path == '/books/' %}active{% endif %}">
          <i class="fas fa-book me-1"></i>Books
        </a>
        <a href="{% url 'issue_list' %}" class="btn btn-outline-light btn-sm nav-btn {% if request.path == '/issue/' %}active{% endif %}">
          <i class="fas fa-hand-holding me-1"></i>Issue / Return
        </a>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
